kind = "web"
previewPath = "/"
title = "Matcha Store"
version = "1.0.0"
id = "artifacts/matcha-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23585

[services.development]
run = "pnpm --filter @workspace/matcha-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matcha-store", "run", "build" ]
publicDir = "artifacts/matcha-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23585"
BASE_PATH = "/"
